<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>BCN Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #topbar { display: flex; align-items: center; gap: 24px; padding: 12px 20px; background: #111; border-bottom: 1px solid #222; flex-shrink: 0; }
    #topbar h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 15px; font-weight: 700; }
    #updated { margin-left: auto; font-size: 11px; color: #444; }
    #map { flex: 1; }
    #layers { position: absolute; top: 70px; right: 12px; display: flex; flex-direction: column; gap: 5px; z-index: 10; width: 155px; }
    .layer-group { background: #0e0e0e; border: 1px solid #1e1e1e; border-radius: 8px; overflow: hidden; }
    .layer-group-header { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .layer-group-header span { font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .layer-group-header::after { content: '▸'; font-size: 9px; color: #333; transition: transform 0.15s; }
    .layer-group.open .layer-group-header::after { transform: rotate(90deg); }
    .layer-group-body { display: none; padding: 0 8px 8px; flex-direction: column; gap: 3px; }
    .layer-group.open .layer-group-body { display: flex; }
    .layer-btn { padding: 5px 8px; border-radius: 6px; border: 1px solid #1a1a1a; background: transparent; color: #555; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; width: 100%; text-align: left; }
    .layer-btn.active { border-color: #333; background: #161616; color: #fff; }
    .sub-group { width: 100%; }
    .sub-group-header { padding: 5px 8px; border-radius: 6px; border: 1px solid #1a1a1a; background: transparent; color: #555; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; user-select: none; }
    .sub-group-header::after { content: '▸'; font-size: 8px; color: #333; margin-left: auto; transition: transform 0.15s; }
    .sub-group.open .sub-group-header::after { transform: rotate(90deg); }
    .sub-group-body { display: none; flex-direction: column; gap: 3px; padding: 4px 0 0 10px; }
    .sub-group.open .sub-group-body { display: flex; }
    .layer-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    #tooltip { position: absolute; pointer-events: none; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.6; max-width: 240px; z-index: 20; display: none; }
    #tooltip strong { font-size: 13px; display: block; margin-bottom: 4px; }
    .metro-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 3px; }
    .metro-popup { font-family: -apple-system, sans-serif; color: #fff; background: #111; border-radius: 10px; padding: 14px 16px; min-width: 220px; }
    .metro-popup h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .metro-popup .direction { margin-bottom: 10px; }
    .metro-popup .dir-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .metro-popup .dir-dest { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .metro-popup .train { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .metro-popup .train .time { color: #fff; }
    .metro-popup .train .real { color: #22c55e; font-size: 9px; font-weight: 600; }
    .metro-popup .train .teorico { color: #555; font-size: 9px; }
    .metro-popup .loading { color: #555; font-size: 12px; }
    .mapboxgl-popup-content { background: #111 !important; border: 1px solid #333 !important; border-radius: 10px !important; padding: 0 !important; box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important; }
    .mapboxgl-popup-tip { border-top-color: #333 !important; }
    #time-slider { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #333; border-radius: 12px; padding: 12px 20px; z-index: 20; display: none; min-width: 380px; text-align: center; }
    #time-slider .ts-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    #time-slider .ts-value { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    #time-slider input[type=range] { width: 100%; accent-color: #3b82f6; cursor: pointer; }
    #time-slider .ts-ends { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 2px; }
    #time-slider .ts-mode { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
    #time-slider .ts-tab { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #555; cursor: pointer; }
    #time-slider .ts-tab.active { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }
    #ships-panel { position: absolute; top: 60px; left: 16px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 14px 16px; z-index: 20; display: none; max-height: 70vh; overflow-y: auto; min-width: 280px; }
    #ships-panel h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #fff; }
    .ship-row { border-bottom: 1px solid #1e1e1e; padding: 8px 0; font-size: 12px; }
    .ship-row:last-child { border-bottom: none; }
    .ship-name { font-weight: 700; color: #fff; }
    .ship-detail { color: #555; font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
<div id="topbar">
  <h1>BCN LIVE</h1>
  <div class="stat"><span class="stat-label">Congestió</span><span class="stat-value" id="s-congestion">—</span></div>
  <div class="stat"><span class="stat-label">Bicis</span><span class="stat-value" id="s-bikes">—</span></div>
  <div class="stat"><span class="stat-label">Elèctric</span><span class="stat-value" id="s-electric">—</span></div>
  <div class="stat"><span class="stat-label">NO₂ avg</span><span class="stat-value" id="s-no2">—</span></div>
  <div class="stat"><span class="stat-label">Temp</span><span class="stat-value" id="s-temp">—</span></div>
  <div class="stat"><span class="stat-label">Vent</span><span class="stat-value" id="s-wind">—</span></div>
  <div class="stat"><span class="stat-label">Pluja</span><span class="stat-value" id="s-rain">—</span></div>
  <div class="stat"><span class="stat-label">Vaixells</span><span class="stat-value" id="s-ships">—</span></div>
  <span id="updated">—</span>
</div>
<div id="map"></div>
<div id="layers">
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Transport</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('traffic',this)"><span class="layer-dot" style="background:#ef4444"></span>Trànsit</button>
      <div class="sub-group" id="sg-metro">
        <div class="sub-group-header" onclick="document.getElementById('sg-metro').classList.toggle('open')"><span class="layer-dot" style="background:linear-gradient(135deg,#e3000b 33%,#009f6b 66%,#ffcc00);border-radius:2px"></span>Metro</div>
        <div class="sub-group-body">
          <button class="layer-btn" onclick="toggleLayer('metro_routes',this)"><span class="layer-dot" style="background:linear-gradient(135deg,#e3000b 33%,#009f6b 66%,#ffcc00);border-radius:2px"></span>Línies</button>
          <button class="layer-btn" onclick="toggleLayer('metro',this)"><span class="layer-dot" style="background:#a855f7"></span>Estacions</button>
          <button class="layer-btn" onclick="toggleLayer('metro_trains',this)"><span class="layer-dot" style="background:#fff;border:2px solid #a855f7;border-radius:50%"></span>Trens en viu</button>
        </div>
      </div>
      <button class="layer-btn" onclick="toggleLayer('bicing',this)"><span class="layer-dot" style="background:#3b82f6"></span>Bicing</button>
      <button class="layer-btn" onclick="toggleLayer('bus',this)"><span class="layer-dot" style="background:#f59e0b"></span>Bus</button>
      <button class="layer-btn" onclick="toggleLayer('trains',this)"><span class="layer-dot" style="background:#f87171"></span>Rodalies</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Cel & Mar</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('flights',this)"><span class="layer-dot" style="background:#e2e8f0"></span>Vols</button>
      <button class="layer-btn" onclick="toggleLayer('ships',this)"><span class="layer-dot" style="background:#94a3b8"></span>Port</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Natura</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('arbres',this)"><span class="layer-dot" style="background:#4ade80"></span>Arbres</button>
      <button class="layer-btn" onclick="toggleLayer('zones_verdes',this)"><span class="layer-dot" style="background:#4ade80;border-radius:2px"></span>Zones Verdes</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Dades Urbanes</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('accidents',this)"><span class="layer-dot" style="background:#fbbf24"></span>Accidents</button>
      <button class="layer-btn" onclick="toggleLayer('obras',this)"><span class="layer-dot" style="background:#fb923c"></span>Obres</button>
      <button class="layer-btn" onclick="toggleLayer('soroll',this)"><span class="layer-dot" style="background:#f59e0b;border-radius:2px"></span>Soroll</button>
      <button class="layer-btn" onclick="toggleLayer('air',this)"><span class="layer-dot" style="background:#22c55e"></span>Aire</button>
      <button class="layer-btn" onclick="toggleLayer('calor',this)"><span class="layer-dot" style="background:#f87171;border-radius:2px"></span>Illa de Calor</button>
      <button class="layer-btn" onclick="toggleLayer('poblacio',this)"><span class="layer-dot" style="background:#c084fc;border-radius:2px"></span>Densitat</button>
      <button class="layer-btn" onclick="toggleLayer('airbnb',this)"><span class="layer-dot" style="background:#ff385c"></span>Airbnb</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Càmeres</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('camaras_dgt',this)"><span class="layer-dot" style="background:#f43f5e;border-radius:2px"></span>DGT Catalunya</button>
      <button class="layer-btn" onclick="toggleLayer('camaras_sct',this)"><span class="layer-dot" style="background:#fb923c;border-radius:2px"></span>SCT Rondes</button>
      <button class="layer-btn" onclick="toggleLayer('camaras_bcn',this)"><span class="layer-dot" style="background:#38bdf8;border-radius:2px"></span>Ajuntament BCN</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Visualització 3D</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('edificis',this)"><span class="layer-dot" style="background:#94a3b8;border-radius:2px"></span>Edificis 3D</button>
      <button class="layer-btn" onclick="toggleLayer('soroll3d',this)"><span class="layer-dot" style="background:linear-gradient(135deg,#1d4ed8,#ef4444);border-radius:2px"></span>3D Soroll</button>
    </div>
  </div>
  <div class="layer-group">
    <div class="layer-group-header" onclick="this.parentElement.classList.toggle('open')"><span>Equipaments</span></div>
    <div class="layer-group-body">
      <button class="layer-btn" onclick="toggleLayer('beaches',this)"><span class="layer-dot" style="background:#38bdf8"></span>Platges</button>
      <button class="layer-btn" onclick="toggleLayer('carrega',this)"><span class="layer-dot" style="background:#34d399"></span>Càrrega EV</button>
      <button class="layer-btn" onclick="toggleLayer('fonts',this)"><span class="layer-dot" style="background:#38bdf8"></span>Fonts</button>
      <button class="layer-btn" onclick="toggleLayer('lavabos',this)"><span class="layer-dot" style="background:#a78bfa"></span>WC</button>
      <button class="layer-btn" onclick="toggleLayer('desfibril',this)"><span class="layer-dot" style="background:#f472b6"></span>DEA</button>
      <button class="layer-btn" onclick="toggleLayer('equipaments',this)"><span class="layer-dot" style="background:#fb923c;border-radius:2px"></span>Equipaments</button>
      <button class="layer-btn" onclick="toggleLayer('mercats',this)"><span class="layer-dot" style="background:#facc15;border-radius:2px"></span>Mercats</button>
    </div>
  </div>
</div>
<div id="time-slider">
  <div class="ts-mode">
    <button class="ts-tab active" id="ts-tab-accidents" onclick="setSliderMode('accidents')">Accidents</button>
    <button class="ts-tab" id="ts-tab-obras" onclick="setSliderMode('obras')">Obres</button>
  </div>
  <div class="ts-label" id="ts-label">Filtra per mes</div>
  <div class="ts-value" id="ts-value">—</div>
  <input type="range" id="ts-range" min="0" max="0" value="0" oninput="onSliderChange(this.value)">
  <div class="ts-ends"><span id="ts-start">—</span><span id="ts-end">—</span></div>
</div>
<div id="tooltip"></div>
<div id="ships-panel"><h3>⚓ Vaixells al Port</h3><div id="ships-list"><span style="color:#555">Carregant…</span></div></div>
<script>
const API=window.location.hostname==='192.168.1.34'?'http://192.168.1.34:8001':'';
let map;
const tooltip=document.getElementById('tooltip');
const layerState={traffic:false,bicing:false,metro:false,metro_routes:false,air:false,flights:false,trains:false,bus:false,ships:false,beaches:false,obras:false,arbres:false,accidents:false,edificis:false,poblacio:false,zones_verdes:false,soroll:false,calor:false,carrega:false,fonts:false,desfibril:false,lavabos:false,equipaments:false,mercats:false,airbnb:false,soroll3d:false,camaras_dgt:false,camaras_sct:false,camaras_bcn:false,metro_trains:false};

(async()=>{
  const cfg=await(await fetch(`${API}/api/config`)).json();
  mapboxgl.accessToken=cfg.mapbox_token;
  map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[2.1734,41.3851],zoom:12});

// ── Imatge SDF fletxa tren ────────────────────────────────────────────────────
function _makeTrainArrow(){
  const sz=32, cx=sz/2;
  const canvas=document.createElement('canvas');
  canvas.width=sz; canvas.height=sz;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';
  ctx.beginPath();
  // Punta amunt (0° = nord). Xevron estil fletxa militar.
  ctx.moveTo(cx, 3);          // punta
  ctx.lineTo(cx+11, cx+3);    // espatlla dreta
  ctx.lineTo(cx+6,  cx+3);    // cintura dreta
  ctx.lineTo(cx+6,  sz-4);    // cua dreta
  ctx.lineTo(cx-6,  sz-4);    // cua esquerra
  ctx.lineTo(cx-6,  cx+3);    // cintura esquerra
  ctx.lineTo(cx-11, cx+3);    // espatlla esquerra
  ctx.closePath();
  ctx.fill();
  return ctx.getImageData(0,0,sz,sz);
}

map.on('load',()=>{
  map.addImage('train-arrow', _makeTrainArrow(), {sdf:true});
  // ── Trànsit ──
  map.addSource('traffic',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'traffic-lines',type:'line',source:'traffic',layout:{'line-join':'round','line-cap':'round'},paint:{
    'line-color':['match',['get','estado'],0,'#333',1,'#22c55e',2,'#84cc16',3,'#eab308',4,'#f97316',5,'#ef4444','#333'],
    'line-width':['match',['get','estado'],0,1,1,2,2,2,3,3,4,4,5,5,2],
    'line-opacity':0.85
  }});

  // ── Bicing ──
  map.addSource('bicing',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'bicing-circles',type:'circle',source:'bicing',paint:{
    'circle-radius':['interpolate',['linear'],['get','bikes'],0,4,20,12],
    'circle-color':['case',['==',['get','bikes'],0],'#374151',['<',['get','bikes'],3],'#f59e0b','#3b82f6'],
    'circle-opacity':0.85,'circle-stroke-width':1,'circle-stroke-color':'#1e3a5f'
  }});
  map.addLayer({id:'bicing-labels',type:'symbol',source:'bicing',
    layout:{'text-field':['get','bikes'],'text-size':10,'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold']},
    paint:{'text-color':'#fff'},minzoom:13});

  // ── Recorreguts metro ──
  map.addSource('metro_routes',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'metro-routes-shadow',type:'line',source:'metro_routes',
    layout:{visibility:'none','line-join':'round','line-cap':'round'},
    paint:{'line-color':'#000','line-width':['interpolate',['linear'],['zoom'],10,5,15,10],'line-opacity':0.3,'line-blur':3}
  });
  map.addLayer({id:'metro-routes-line',type:'line',source:'metro_routes',
    layout:{visibility:'none','line-join':'round','line-cap':'round'},
    paint:{'line-color':['get','color'],'line-width':['interpolate',['linear'],['zoom'],10,3,15,7],'line-opacity':0.9}
  });
  map.addLayer({id:'metro-routes-label',type:'symbol',source:'metro_routes',
    layout:{visibility:'none','symbol-placement':'line','text-field':['get','nom'],
      'text-size':11,'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold'],
      'text-offset':[0,-0.8],'symbol-spacing':200},
    paint:{'text-color':['get','color'],'text-halo-color':'#000','text-halo-width':1.5},
    minzoom:12
  });
  fetch('/metro_lines.json').then(r=>r.json()).then(lines=>{
    const features=Object.values(lines)
      .filter(l=>l.geometry_coords && l.geometry_coords.length>1)
      .map(l=>({type:'Feature',properties:{nom:l.nom,color:l.color},geometry:{type:'LineString',coordinates:l.geometry_coords}}));
    map.getSource('metro_routes').setData({type:'FeatureCollection',features});
  });

  // ── Metro ──
  map.addSource('metro',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'metro-circles',type:'circle',source:'metro',paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],11,5,15,10],
    'circle-color':['get','color'],
    'circle-opacity':0.95,
    'circle-stroke-width':2,
    'circle-stroke-color':'#fff',
  }});
  map.addLayer({id:'metro-labels',type:'symbol',source:'metro',
    layout:{
      'text-field':['get','name'],
      'text-size':11,
      'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
      'text-offset':[0,1.2],
      'text-anchor':'top',
    },
    paint:{'text-color':'#ccc','text-halo-color':'#000','text-halo-width':1},
    minzoom:13});

  // ── Trens metro en viu ──
  map.addSource('metro_trains',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'metro-trains-arrow',type:'symbol',source:'metro_trains',layout:{
    visibility:'none',
    'icon-image':'train-arrow',
    'icon-size':['interpolate',['linear'],['zoom'],10,0.5,15,0.9],
    'icon-rotate':['get','bearing'],
    'icon-rotation-alignment':'map',
    'icon-allow-overlap':true,
    'icon-ignore-placement':true,
    'text-field':['get','linia'],
    'text-size':9,
    'text-offset':[0,1.8],
    'text-anchor':'top',
    'text-allow-overlap':true,
    'text-ignore-placement':true,
  },paint:{
    'icon-color':['get','color'],
    'icon-halo-color':'rgba(0,0,0,0.7)',
    'icon-halo-width':1.5,
    'text-color':['get','color'],
    'text-halo-color':'#000',
    'text-halo-width':1,
  }});

  map.on('click','metro-trains-arrow',e=>{
    const p=e.features[0].properties;
    new mapboxgl.Popup({closeButton:true,maxWidth:'220px'})
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<div class="metro-popup">
        <h3 style="color:${p.color}">${p.linia}</h3>
        <div>→ <strong>${p.desti}</strong></div>
        <div style="font-size:11px;color:#aaa;margin-top:4px">${p.is_real?'Dades reals':'Teòric'} · ${Math.abs(Math.round(p.eta_s))}s per arribar</div>
      </div>`)
      .addTo(map);
  });
  map.on('mouseenter','metro-trains-arrow',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','metro-trains-arrow',()=>map.getCanvas().style.cursor='');

  // ── Vuelos ──
  map.addSource('flights',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'flights-symbols',type:'symbol',source:'flights',layout:{
    'text-field':'✈',
    'text-size':18,
    'text-rotate':['get','heading'],
    'text-rotation-alignment':'map',
    'text-allow-overlap':true,
    'text-ignore-placement':true,
  },paint:{
    'text-color':'#e2e8f0',
    'text-halo-color':'#000',
    'text-halo-width':1,
  }});
  map.addLayer({id:'flights-labels',type:'symbol',source:'flights',layout:{
    'text-field':['get','callsign'],
    'text-size':10,
    'text-offset':[0,1.4],
    'text-anchor':'top',
    'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
    'text-allow-overlap':false,
  },paint:{

      else{
        for(const b of buses.slice(0,5)){

          const label=min<=0?'Ara':min===1?'1 min':`${min} min`;

        }
      }
      html+=`<div style="font-size:10px;color:#444;margin-top:8px">Parada #${p.stop_id}</div></div>`;
      busPopup.setHTML(html);
    }catch(err){busPopup.setHTML(`<div class="metro-popup"><h3>🚌 ${p.name}</h3><p class="loading">Error</p></div>`);}

    const lines=p.lines.split(',').map(l=>`<span class="metro-badge" style="background:${p.color};color:#fff">${l.trim()}</span>`).join('');
    metroPopup=new mapboxgl.Popup({closeButton:true,maxWidth:'280px'})
      .setLngLat(lngLat)
      .setHTML(`<div class="metro-popup"><h3>${p.name} ${lines}</h3><p class="loading">Carregant horaris…</p></div>`)
      .addTo(map);
    try{
      const d=await(await fetch(`${API}/api/metro/arrivals/${p.id}`)).json();
      let html=`<div class="metro-popup"><h3>${p.name} ${lines}</h3>`;
      for(const a of d.arrivals){
        const trens=a.propers_trens.slice(0,3).map(t=>{
          const min=Math.floor(t.wait_s/60), sec=t.wait_s%60;
          const label=min>0?`${min}min`:`${sec}s`;
          const badge=t.is_real?`<span class="real">● LIVE</span>`:`<span class="teorico">~ teòric</span>`;
          return `<div class="train"><span class="time">${label}</span>${badge}</div>`;
        }).join('');
        html+=`<div class="direction"><div class="dir-label">direcció</div><div class="dir-dest">→ ${a.desti}</div>${trens}</div>`;
      }
      html+='</div>';
      metroPopup.setHTML(html);
    }catch(err){metroPopup.setHTML(`<div class="metro-popup"><h3>${p.name}</h3><p class="loading">Error carregant horaris</p></div>`);}
  });

  ['traffic-lines','bicing-circles','metro-circles'].forEach(l=>{
    map.on('mouseenter',l,()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave',l,()=>map.getCanvas().style.cursor='');
  });

  // Amaga totes les capes al init — l'usuari les activa manualment
  const _hide=id=>{try{map.setLayoutProperty(id,'visibility','none');}catch(e){}};
  _hide('traffic-lines');
  _hide('bicing-circles');_hide('bicing-labels');
  _hide('metro-circles');_hide('metro-labels');
  _hide('flights-symbols');_hide('flights-labels');
  _hide('ships-circles');_hide('ships-labels');
  _hide('trains-circles');_hide('trains-labels');
  _hide('obras-circles');_hide('obras-labels');

  fetchAll();
  setInterval(fetchAll,60000);
});
})();

async function fetchAll(){
  await Promise.all([fetchTraffic(),fetchBicing(),fetchAir(),fetchMetro(),fetchBus(),fetchFlights(),fetchTrains(),fetchWeather(),fetchShips(),fetchBeaches(),fetchObras(),fetchAccidents(),fetchSnapshot()]);
  fetchArbres();
  fetchPoblacio();
  fetchZonesVerdes();
  fetchSoroll();
  fetchCalor();
  fetchCarrega();
  fetchFonts();
  fetchDesfibril();
  fetchLavabos();
  fetchEquipaments();
  fetchMercats();
  fetchAirbnb();
  fetchCamarasDgt();
  fetchCamarasSct();
  fetchCamarasBcn();

  setInterval(fetchFlights,60000);
  setInterval(fetchTrains,20000);
  document.getElementById('updated').textContent='actualitzat '+new Date().toLocaleTimeString('ca');
}
async function fetchTraffic(){const r=await fetch(`${API}/api/trams?geojson=true`);map.getSource('traffic').setData(await r.json());}
async function fetchBicing(){
  const{stations}=await(await fetch(`${API}/api/bicing`)).json();
  map.getSource('bicing').setData({type:'FeatureCollection',features:stations.map(s=>({type:'Feature',properties:{name:s.name,bikes:s.bikes,bikes_electric:s.bikes_electric,slots_free:s.slots_free},geometry:{type:'Point',coordinates:[s.lon,s.lat]}}))});
}
async function fetchWeather(){
  const d=await(await fetch(`${API}/api/weather`)).json();
  const windDir=['N','NE','E','SE','S','SO','O','NO'][Math.round(d.wind_direction/45)%8];
  document.getElementById('s-temp').textContent=d.temperature+'°C';
  document.getElementById('s-wind').textContent=`${d.wind_speed_kmh} km/h ${windDir}`;
  document.getElementById('s-rain').textContent=d.precipitation>0?`${d.precipitation}mm`:'0 mm';
}
async function fetchObras(){
  const data=await(await fetch(`${API}/api/obras?geojson=true`)).json();
  map.getSource('obras').setData(data);
}
async function fetchShips(){
  const d=await(await fetch(`${API}/api/ships`)).json();
  document.getElementById('s-ships').textContent=d.total;
  const list=document.getElementById('ships-list');
  list.innerHTML=d.ships.map(s=>`
    <div class="ship-row">
      <div class="ship-name">${s.name}</div>
      <div class="ship-detail">${s.country} · ${s.operator.substring(0,30)}</div>
      <div class="ship-detail">ETD: ${s.etd.substring(11,16)||'—'} · Moll: ${s.berth||'—'}</div>
    </div>`).join('');
  const geo=await(await fetch(`${API}/api/ships?geojson=true`)).json();
  map.getSource('ships').setData(geo);
}

async function fetchBeaches(){
  const{beaches}=await(await fetch(`${API}/api/beaches`)).json();
  const features=beaches.filter(b=>b.coords).map(b=>({
    type:'Feature',
    properties:{...b,name:b.name||b.id.split('.').pop().replace(/_/g,' ')},
    geometry:{type:'Point',coordinates:b.coords}
  }));
  map.getSource('beaches').setData({type:'FeatureCollection',features});
}

// ── Animació trens metro ──────────────────────────────────────────────────────
let _metroTrains=[];        // snapshot de posicions del backend
let _metroTrainsRaf=null;   // requestAnimationFrame id
let _metroTrainsInterval=null;
let _metroTrainsTs=0;       // timestamp del darrer fetch (ms)
const METRO_REFRESH_MS=15000; // fetch nou cada 15s
const METRO_ANIM_SPEED=0.000008; // graus/ms ≈ ~40km/h en equidistant lat/lon

function _trainsToGeoJSON(trains){
  return {type:'FeatureCollection',features:trains.map(t=>({
    type:'Feature',
    properties:{linia:t.linia,color:t.color,desti:t.desti,eta_s:t.eta_s,is_real:t.is_real,bearing:t.bearing||0},
    geometry:{type:'Point',coordinates:[t.lon,t.lat]}
  }))};
}

async function fetchMetroTrains(){
  try{
    const d=await(await fetch(`${API}/api/metro/trains`)).json();
    _metroTrains=d.trains||[];
    _metroTrainsTs=Date.now();
    if(layerState.metro_trains) map.getSource('metro_trains').setData(_trainsToGeoJSON(_metroTrains));
  }catch(e){console.warn('metro trains fetch error',e);}
}

function _animateMetroTrains(){
  if(!layerState.metro_trains){_metroTrainsRaf=null;return;}
  const elapsed=(Date.now()-_metroTrainsTs)/1000; // segons des del darrer fetch
  // Interpolar cada tren cap a la seva estació destí
  const animated=_metroTrains.map(t=>{
    // Moure lleument en la direcció aproximada de moviment
    // Usem eta_s per saber quant falta: si eta_s=60 i han passat 5s, ara eta_s≈55
    const remaining=Math.max(0,t.eta_s-elapsed);
    const fraction=elapsed/(t.eta_s+elapsed+0.001); // [0,1] progrés des del fetch
    return {...t,
      lon:t.lon + (t.dlon||0)*fraction,
      lat:t.lat + (t.dlat||0)*fraction,
    };
  });
  if(map.getSource('metro_trains')) map.getSource('metro_trains').setData(_trainsToGeoJSON(animated));
  _metroTrainsRaf=requestAnimationFrame(_animateMetroTrains);
}

function startMetroTrainsLoop(){
  fetchMetroTrains();
  _metroTrainsInterval=setInterval(fetchMetroTrains,METRO_REFRESH_MS);
  _animateMetroTrains();
}
function stopMetroTrainsLoop(){
  clearInterval(_metroTrainsInterval);
  if(_metroTrainsRaf) cancelAnimationFrame(_metroTrainsRaf);
  _metroTrainsRaf=null;
}

  if(layer==='obras'){map.setLayoutProperty('obras-circles','visibility',vis);map.setLayoutProperty('obras-labels','visibility',vis);updateSliderVisibility();return;}
  if(layer==='carrega')map.setLayoutProperty('carrega-circles','visibility',vis);

  if(layer==='camaras_sct'){map.setLayoutProperty('camaras-sct-circles','visibility',vis);map.setLayoutProperty('camaras-sct-labels','visibility',vis);}

// ── Soroll 3D — Spatial join client-side ─────────────────────────────────────
let _sorollGridIdx=null;
const _SCELL=0.006;
const _paintedBuildings=new Set(); // IDs ja processats — no cal repetir

function _buildSorollIndex(){
  const src=map.getSource('soroll');
  if(!src||!src._data) return;
  const features=src._data.features||[];
  const idx={};
  for(const f of features){
    const db=f.properties&&f.properties.db_total;
    if(!db) continue;
    const coords=f.geometry.type==='LineString'?f.geometry.coordinates:f.geometry.coordinates.flat();
    for(const [lon,lat] of coords){
      const k=`${Math.floor(lon/_SCELL)},${Math.floor(lat/_SCELL)}`;
      if(!idx[k]) idx[k]=[];
      idx[k].push({lon,lat,db});
    }
  }
  _sorollGridIdx=idx;
  _paintedBuildings.clear();
}

function _nearestDb(lon,lat){
  if(!_sorollGridIdx) return null;
  const cx=Math.floor(lon/_SCELL), cy=Math.floor(lat/_SCELL);
  let best=null, bestD=Infinity;
  for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++){
    for(const p of (_sorollGridIdx[`${cx+dx},${cy+dy}`]||[])){
      const d=(p.lon-lon)**2+(p.lat-lat)**2;
      if(d<bestD){bestD=d;best=p.db;}
    }
  }
  return best;
}

const _NOISE_PAINT=['interpolate',['linear'],['feature-state','noise'],
  38,'#1e3a5f',45,'#1d4ed8',52,'#16a34a',57,'#eab308',62,'#f97316',67,'#ef4444',72,'#7f1d1d',78,'#ffffff'];
const _DEFAULT_PAINT=['interpolate',['linear'],['get','height'],
  0,'#1a1a2e',10,'#16213e',20,'#0f3460',40,'#1a1a4e',80,'#23235e',150,'#2d2d6e'];

function _paintBuildingsNoise(){
  if(!layerState['soroll3d']) return;
  if(!_sorollGridIdx) _buildSorollIndex();
  if(!_sorollGridIdx) return;
  const buildings=map.queryRenderedFeatures({layers:['edificis-3d']});
  // Només processa edificis nous — els ja pintats no es toquen
  const news=buildings.filter(b=>b.id!=null&&!_paintedBuildings.has(b.id));
  for(const b of news){
    let lon,lat;
    try{[lon,lat]=b.geometry.coordinates[0][0];}catch(e){continue;}
    const db=_nearestDb(lon,lat);
    if(db!=null){
      map.setFeatureState({source:'composite',sourceLayer:'building',id:b.id},{noise:db});
      _paintedBuildings.add(b.id);
    }
  }
}

let _noiseRenderBound=false;
function _activateSoroll3D(){
  // Canvia el color dels edificis a feature-state noise
  map.setPaintProperty('edificis-3d','fill-extrusion-color',
    ['case',['!=',['feature-state','noise'],null],_NOISE_PAINT,_DEFAULT_PAINT]);
  if(!_noiseRenderBound){
    map.on('moveend',_paintBuildingsNoise);
    map.on('zoomend',_paintBuildingsNoise);
    _noiseRenderBound=true;
  }
  // Espera que els edificis estiguin carregats
  if(map.isStyleLoaded()) setTimeout(_paintBuildingsNoise,400);
}

function _deactivateSoroll3D(){
  map.setPaintProperty('edificis-3d','fill-extrusion-color',_DEFAULT_PAINT);
}

// ── Time Slider ──────────────────────────────────────────────────────────────
const MESOS=['Gen','Feb','Mar','Abr','Mai','Jun','Jul','Ago','Set','Oct','Nov','Des'];
let sliderMode=null; // 'accidents' | 'obras'
let sliderYMs=[]; // llista ordenada de valors YM disponibles

function ym2label(ym){const y=Math.floor(ym/100);const m=ym%100;return `${MESOS[m-1]} ${y}`;}

function buildYMRange(minYM,maxYM){
  const r=[];
  let y=Math.floor(minYM/100),m=minYM%100;
  while(y*100+m<=maxYM){r.push(y*100+m);m++;if(m>12){m=1;y++;}}
  return r;
}

function setSliderMode(mode){
  sliderMode=mode;
  document.querySelectorAll('.ts-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`ts-tab-${mode}`).classList.add('active');
  if(mode==='accidents'){
    sliderYMs=buildYMRange(202401,202512);
    document.getElementById('ts-label').textContent='Accidents per mes';
  } else {
    sliderYMs=buildYMRange(202001,202812);
    document.getElementById('ts-label').textContent='Obres actives per mes';
  }
  const range=document.getElementById('ts-range');
  range.min=0; range.max=sliderYMs.length-1;
  // Per accidents, posicionar al mes actual; per obras al mes actual
  const now=new Date(); const curYM=now.getFullYear()*100+(now.getMonth()+1);
  let idx=sliderYMs.indexOf(curYM);
  if(idx<0) idx=sliderYMs.length-1;
  range.value=idx;
  document.getElementById('ts-start').textContent=ym2label(sliderYMs[0]);
  document.getElementById('ts-end').textContent=ym2label(sliderYMs[sliderYMs.length-1]);
  onSliderChange(idx);
}

function onSliderChange(idx){
  const ym=sliderYMs[parseInt(idx)];
  document.getElementById('ts-value').textContent=ym2label(ym);
  if(sliderMode==='accidents'){
    const f=['==',['get','ym'],ym];
    if(map.getLayer('accidents-heat')) map.setFilter('accidents-heat',f);
    if(map.getLayer('accidents-circles')) map.setFilter('accidents-circles',f);
  } else if(sliderMode==='obras'){
    const f=['all',['<=',['get','inici_ym'],ym],['>=',['get','fi_ym'],ym]];
    if(map.getLayer('obras-circles')) map.setFilter('obras-circles',f);
    if(map.getLayer('obras-labels')) map.setFilter('obras-labels',f);
  }
}

function updateSliderVisibility(){
  const show=layerState['accidents']||layerState['obras'];
  document.getElementById('time-slider').style.display=show?'block':'none';
  if(show){
    // activa el mode de la capa que s'acaba d'activar
    if(layerState['accidents']&&sliderMode!=='accidents') setSliderMode('accidents');
    else if(layerState['obras']&&!layerState['accidents']&&sliderMode!=='obras') setSliderMode('obras');
  } else {
    sliderMode=null;
    // treu filtres
    if(map.getLayer('accidents-heat')) map.setFilter('accidents-heat',null);
    if(map.getLayer('accidents-circles')) map.setFilter('accidents-circles',null);
    if(map.getLayer('obras-circles')) map.setFilter('obras-circles',null);
    if(map.getLayer('obras-labels')) map.setFilter('obras-labels',null);
  }
}
