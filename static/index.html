<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>BCN Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #topbar { display: flex; align-items: center; gap: 24px; padding: 12px 20px; background: #111; border-bottom: 1px solid #222; flex-shrink: 0; }
    #topbar h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 15px; font-weight: 700; }
    #updated { margin-left: auto; font-size: 11px; color: #444; }
    #map { flex: 1; }
    #layers { position: absolute; top: 70px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
    .layer-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #333; background: #111; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
    .layer-btn.active { background: #1a1a1a; color: #fff; border-color: #555; }
    .layer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #tooltip { position: absolute; pointer-events: none; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.6; max-width: 240px; z-index: 20; display: none; }
    #tooltip strong { font-size: 13px; display: block; margin-bottom: 4px; }
    .metro-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 3px; }
    .metro-popup { font-family: -apple-system, sans-serif; color: #fff; background: #111; border-radius: 10px; padding: 14px 16px; min-width: 220px; }
    .metro-popup h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .metro-popup .direction { margin-bottom: 10px; }
    .metro-popup .dir-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .metro-popup .dir-dest { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .metro-popup .train { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .metro-popup .train .time { color: #fff; }
    .metro-popup .train .real { color: #22c55e; font-size: 9px; font-weight: 600; }
    .metro-popup .train .teorico { color: #555; font-size: 9px; }
    .metro-popup .loading { color: #555; font-size: 12px; }
    .mapboxgl-popup-content { background: #111 !important; border: 1px solid #333 !important; border-radius: 10px !important; padding: 0 !important; box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important; }
    .mapboxgl-popup-tip { border-top-color: #333 !important; }
    #ships-panel { position: absolute; top: 60px; left: 16px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 14px 16px; z-index: 20; display: none; max-height: 70vh; overflow-y: auto; min-width: 280px; }
    #ships-panel h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #fff; }
    .ship-row { border-bottom: 1px solid #1e1e1e; padding: 8px 0; font-size: 12px; }
    .ship-row:last-child { border-bottom: none; }
    .ship-name { font-weight: 700; color: #fff; }
    .ship-detail { color: #555; font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
<div id="topbar">
  <h1>BCN LIVE</h1>
  <div class="stat"><span class="stat-label">Congestió</span><span class="stat-value" id="s-congestion">—</span></div>
  <div class="stat"><span class="stat-label">Bicis</span><span class="stat-value" id="s-bikes">—</span></div>
  <div class="stat"><span class="stat-label">Elèctric</span><span class="stat-value" id="s-electric">—</span></div>
  <div class="stat"><span class="stat-label">NO₂ avg</span><span class="stat-value" id="s-no2">—</span></div>
  <div class="stat"><span class="stat-label">Temp</span><span class="stat-value" id="s-temp">—</span></div>
  <div class="stat"><span class="stat-label">Vent</span><span class="stat-value" id="s-wind">—</span></div>
  <div class="stat"><span class="stat-label">Pluja</span><span class="stat-value" id="s-rain">—</span></div>
  <div class="stat"><span class="stat-label">Vaixells</span><span class="stat-value" id="s-ships">—</span></div>
  <span id="updated">—</span>
</div>
<div id="map"></div>
<div id="layers">
  <button class="layer-btn active" onclick="toggleLayer('traffic',this)"><span class="layer-dot" style="background:#ef4444"></span>Trànsit</button>
  <button class="layer-btn active" onclick="toggleLayer('bicing',this)"><span class="layer-dot" style="background:#3b82f6"></span>Bicing</button>
  <button class="layer-btn active" onclick="toggleLayer('metro',this)"><span class="layer-dot" style="background:#a855f7"></span>Metro</button>
  <button class="layer-btn" onclick="toggleLayer('bus',this)"><span class="layer-dot" style="background:#f59e0b"></span>Bus</button>
  <button class="layer-btn active" onclick="toggleLayer('flights',this)"><span class="layer-dot" style="background:#e2e8f0"></span>Vols</button>
  <button class="layer-btn active" onclick="toggleLayer('trains',this)"><span class="layer-dot" style="background:#f87171"></span>Rodalies</button>
  <button class="layer-btn" onclick="toggleLayer('beaches',this)"><span class="layer-dot" style="background:#38bdf8"></span>Platges</button>
  <button class="layer-btn active" onclick="toggleLayer('obras',this)"><span class="layer-dot" style="background:#fb923c"></span>Obres</button>
  <button class="layer-btn active" onclick="toggleLayer('ships',this)"><span class="layer-dot" style="background:#94a3b8"></span>Port ⚓</button>
  <button class="layer-btn" onclick="toggleLayer('air',this)"><span class="layer-dot" style="background:#22c55e"></span>Aire</button>
  <button class="layer-btn" onclick="toggleLayer('arbres',this)"><span class="layer-dot" style="background:#4ade80"></span>Arbres</button>
  <button class="layer-btn" onclick="toggleLayer('accidents',this)"><span class="layer-dot" style="background:#fbbf24"></span>Accidents</button>
  <button class="layer-btn" onclick="toggleLayer('edificis',this)"><span class="layer-dot" style="background:#94a3b8;border-radius:2px"></span>Edificis 3D</button>
  <button class="layer-btn" onclick="toggleLayer('poblacio',this)"><span class="layer-dot" style="background:#c084fc;border-radius:2px"></span>Densitat</button>
  <button class="layer-btn" onclick="toggleLayer('zones_verdes',this)"><span class="layer-dot" style="background:#4ade80;border-radius:2px"></span>Zones Verdes</button>
  <button class="layer-btn" onclick="toggleLayer('soroll',this)"><span class="layer-dot" style="background:#f59e0b;border-radius:2px"></span>Soroll</button>
  <button class="layer-btn" onclick="toggleLayer('calor',this)"><span class="layer-dot" style="background:#f87171;border-radius:2px"></span>Illa de Calor</button>
  <button class="layer-btn" onclick="toggleLayer('carrega',this)"><span class="layer-dot" style="background:#34d399"></span>Càrrega EV</button>
  <button class="layer-btn" onclick="toggleLayer('fonts',this)"><span class="layer-dot" style="background:#38bdf8"></span>Fonts</button>
  <button class="layer-btn" onclick="toggleLayer('desfibril',this)"><span class="layer-dot" style="background:#f472b6"></span>DEA</button>
  <button class="layer-btn" onclick="toggleLayer('lavabos',this)"><span class="layer-dot" style="background:#a78bfa"></span>Lavabos</button>
  <button class="layer-btn" onclick="toggleLayer('equipaments',this)"><span class="layer-dot" style="background:#fb923c;border-radius:2px"></span>Equipaments</button>
  <button class="layer-btn" onclick="toggleLayer('mercats',this)"><span class="layer-dot" style="background:#facc15;border-radius:2px"></span>Mercats</button>
</div>
<div id="tooltip"></div>
<div id="ships-panel"><h3>⚓ Vaixells al Port</h3><div id="ships-list"><span style="color:#555">Carregant…</span></div></div>
<script>
const API=window.location.hostname==='192.168.1.34'?'http://192.168.1.34:8001':'';
let map;
const tooltip=document.getElementById('tooltip');
const layerState={traffic:true,bicing:true,metro:true,air:false,flights:true,trains:true,bus:false,ships:true,beaches:false,obras:true,arbres:false,accidents:false,edificis:false,poblacio:false,zones_verdes:false,soroll:false,calor:false,carrega:false,fonts:false,desfibril:false,lavabos:false,equipaments:false,mercats:false};

(async()=>{
  const cfg=await(await fetch(`${API}/api/config`)).json();
  mapboxgl.accessToken=cfg.mapbox_token;
  map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[2.1734,41.3851],zoom:12});

map.on('load',()=>{
  // ── Trànsit ──
  map.addSource('traffic',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'traffic-lines',type:'line',source:'traffic',layout:{'line-join':'round','line-cap':'round'},paint:{
    'line-color':['match',['get','estado'],0,'#333',1,'#22c55e',2,'#84cc16',3,'#eab308',4,'#f97316',5,'#ef4444','#333'],
    'line-width':['match',['get','estado'],0,1,1,2,2,2,3,3,4,4,5,5,2],
    'line-opacity':0.85
  }});

  // ── Bicing ──
  map.addSource('bicing',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'bicing-circles',type:'circle',source:'bicing',paint:{
    'circle-radius':['interpolate',['linear'],['get','bikes'],0,4,20,12],
    'circle-color':['case',['==',['get','bikes'],0],'#374151',['<',['get','bikes'],3],'#f59e0b','#3b82f6'],
    'circle-opacity':0.85,'circle-stroke-width':1,'circle-stroke-color':'#1e3a5f'
  }});
  map.addLayer({id:'bicing-labels',type:'symbol',source:'bicing',
    layout:{'text-field':['get','bikes'],'text-size':10,'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold']},
    paint:{'text-color':'#fff'},minzoom:13});

  // ── Metro ──
  map.addSource('metro',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'metro-circles',type:'circle',source:'metro',paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],11,5,15,10],
    'circle-color':['get','color'],
    'circle-opacity':0.95,
    'circle-stroke-width':2,
    'circle-stroke-color':'#fff',
  }});
  map.addLayer({id:'metro-labels',type:'symbol',source:'metro',
    layout:{
      'text-field':['get','name'],
      'text-size':11,
      'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
      'text-offset':[0,1.2],
      'text-anchor':'top',
    },
    paint:{'text-color':'#ccc','text-halo-color':'#000','text-halo-width':1},
    minzoom:13});

  // ── Vuelos ──
  map.addSource('flights',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'flights-symbols',type:'symbol',source:'flights',layout:{
    'text-field':'✈',
    'text-size':18,
    'text-rotate':['get','heading'],
    'text-rotation-alignment':'map',
    'text-allow-overlap':true,
    'text-ignore-placement':true,
  },paint:{
    'text-color':'#e2e8f0',
    'text-halo-color':'#000',
    'text-halo-width':1,
  }});
  map.addLayer({id:'flights-labels',type:'symbol',source:'flights',layout:{
    'text-field':['get','callsign'],
    'text-size':10,
    'text-offset':[0,1.4],
    'text-anchor':'top',
    'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
    'text-allow-overlap':false,
  },paint:{
    'text-color':'#94a3b8',
    'text-halo-color':'#000',
    'text-halo-width':1,
  },minzoom:10});

  // ── Barcos Port ──
  map.addSource('ships',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'ships-circles',type:'circle',source:'ships',paint:{
    'circle-radius':6,
    'circle-color':'#94a3b8',
    'circle-opacity':0.9,
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#fff',
  }});
  map.addLayer({id:'ships-labels',type:'symbol',source:'ships',layout:{
    'text-field':['get','name'],
    'text-size':10,
    'text-offset':[0,1.2],
    'text-anchor':'top',
    'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
    'text-allow-overlap':false,
  },paint:{'text-color':'#94a3b8','text-halo-color':'#000','text-halo-width':1},minzoom:13});

  // ── Rodalies Renfe ──
  map.addSource('trains',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'trains-circles',type:'circle',source:'trains',paint:{
    'circle-radius':7,
    'circle-color':'#f87171',
    'circle-opacity':0.95,
    'circle-stroke-width':2,
    'circle-stroke-color':'#fff',
  }});
  map.addLayer({id:'trains-labels',type:'symbol',source:'trains',layout:{
    'text-field':['get','label'],
    'text-size':10,
    'text-offset':[0,1.3],
    'text-anchor':'top',
    'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
    'text-allow-overlap':false,
  },paint:{'text-color':'#f87171','text-halo-color':'#000','text-halo-width':1},minzoom:11});

  // ── Obres ──
  map.addSource('obras',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'obras-circles',type:'circle',source:'obras',paint:{
    'circle-radius':6,
    'circle-color':['match',['get','estat'],'En execució','#fb923c','Aturada','#6b7280','#fb923c'],
    'circle-opacity':0.85,
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#fff',
  }});
  map.addLayer({id:'obras-labels',type:'symbol',source:'obras',layout:{
    'text-field':['get','ubicacio'],
    'text-size':10,
    'text-offset':[0,1.2],
    'text-anchor':'top',
    'text-font':['DIN Offc Pro Medium','Arial Unicode MS Regular'],
    'text-allow-overlap':false,
  },paint:{'text-color':'#fb923c','text-halo-color':'#000','text-halo-width':1},minzoom:14});

  // ── Platges ──
  map.addSource('beaches',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'beaches-circles',type:'circle',source:'beaches',layout:{visibility:'none'},paint:{
    'circle-radius':10,
    'circle-color':['match',['get','flag'],'VERDA','#22c55e','GROGA','#eab308','VERMELLA','#ef4444','TANCADA','#374151','#6b7280'],
    'circle-opacity':0.9,'circle-stroke-width':2,'circle-stroke-color':'#fff',
  }});

  // ── Bus stops ──
  map.addSource('bus',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'bus-circles',type:'circle',source:'bus',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,3,16,7],
    'circle-color':'#f59e0b',
    'circle-opacity':0.85,
    'circle-stroke-width':1,
    'circle-stroke-color':'#92400e'
  }});

  // ── Aire heatmap ──
  map.addSource('air',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'air-heat',type:'heatmap',source:'air',layout:{visibility:'none'},paint:{
    'heatmap-weight':['interpolate',['linear'],['get','no2'],0,0,80,1],
    'heatmap-intensity':0.6,'heatmap-radius':60,
    'heatmap-color':['interpolate',['linear'],['heatmap-density'],0,'rgba(0,0,0,0)',0.2,'rgba(34,197,94,0.4)',0.5,'rgba(234,179,8,0.5)',0.8,'rgba(249,115,22,0.6)',1,'rgba(239,68,68,0.7)']
  }});

  // ── Arbres ──
  map.addSource('arbres',{type:'geojson',data:{type:'FeatureCollection',features:[]},cluster:true,clusterMaxZoom:14,clusterRadius:30});
  map.addLayer({id:'arbres-clusters',type:'circle',source:'arbres',layout:{visibility:'none'},filter:['has','point_count'],paint:{
    'circle-radius':['step',['get','point_count'],8,50,12,200,18],
    'circle-color':['step',['get','point_count'],'#166534',50,'#15803d',200,'#16a34a'],
    'circle-opacity':0.75
  }});
  map.addLayer({id:'arbres-cluster-count',type:'symbol',source:'arbres',layout:{visibility:'none',
    'text-field':'{point_count_abbreviated}','text-size':10,'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold']},
    paint:{'text-color':'#fff'},filter:['has','point_count']});
  map.addLayer({id:'arbres-points',type:'circle',source:'arbres',layout:{visibility:'none'},filter:['!',['has','point_count']],paint:{
    'circle-radius':3,'circle-color':'#4ade80','circle-opacity':0.7,'circle-stroke-width':0
  }});

  // ── Accidents ──
  map.addSource('accidents',{type:'geojson',data:{type:'FeatureCollection',features:[]},cluster:false});
  map.addLayer({id:'accidents-heat',type:'heatmap',source:'accidents',maxzoom:14,layout:{visibility:'none'},paint:{
    'heatmap-weight':['match',['get','gravetat'],'mortal',6,'greu',3,1],
    'heatmap-intensity':['interpolate',['linear'],['zoom'],10,1,14,3],
    'heatmap-radius':['interpolate',['linear'],['zoom'],10,6,13,12],
    'heatmap-opacity':['interpolate',['linear'],['zoom'],12,0.9,14,0],
    'heatmap-color':['interpolate',['linear'],['heatmap-density'],
      0,'rgba(0,0,0,0)',
      0.1,'rgba(251,191,36,0.4)',
      0.4,'rgba(249,115,22,0.7)',
      0.7,'rgba(239,68,68,0.85)',
      1,'rgba(185,28,28,1)']
  }});
  map.addLayer({id:'accidents-circles',type:'circle',source:'accidents',minzoom:12,layout:{visibility:'none'},
    paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],12,2,15,['match',['get','gravetat'],'mortal',10,'greu',6,4]],
      'circle-color':['match',['get','gravetat'],'mortal','#ef4444','greu','#f97316','#fbbf24'],
      'circle-opacity':['interpolate',['linear'],['zoom'],12,0,13,0.9],
      'circle-stroke-width':['interpolate',['linear'],['zoom'],12,0,14,1],
      'circle-stroke-color':'rgba(255,255,255,0.6)'
  }});

  // ── Càrrega EV ──
  map.addSource('carrega',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'carrega-circles',type:'circle',source:'carrega',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],11,4,15,9],
    'circle-color':['case',['get','operatiu'],'#34d399','#6b7280'],
    'circle-stroke-width':1.5,
    'circle-stroke-color':['case',['get','operatiu'],'#059669','#374151'],
    'circle-opacity':0.9
  }});

  // ── Equipaments municipals ──
  map.addSource('equipaments',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'equipaments-circles',type:'circle',source:'equipaments',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,5,16,10],
    'circle-color':['match',['get','amenity'],'library','#fb923c','community_centre','#f97316','arts_centre','#ea580c','#fb923c'],
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#c2410c',
    'circle-opacity':0.9
  }});

  // ── Mercats municipals ──
  map.addSource('mercats',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'mercats-circles',type:'circle',source:'mercats',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,6,16,12],
    'circle-color':'#facc15',
    'circle-stroke-width':2,
    'circle-stroke-color':'#ca8a04',
    'circle-opacity':0.95
  }});

  // ── Fonts públiques ──
  map.addSource('fonts',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'fonts-circles',type:'circle',source:'fonts',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,4,16,8],
    'circle-color':'#38bdf8',
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#0284c7',
    'circle-opacity':0.9
  }});

  // ── Desfibril·ladors DEA ──
  map.addSource('desfibril',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'desfibril-circles',type:'circle',source:'desfibril',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,5,16,10],
    'circle-color':'#f472b6',
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#be185d',
    'circle-opacity':0.9
  }});

  // ── Lavabos públics ──
  map.addSource('lavabos',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'lavabos-circles',type:'circle',source:'lavabos',layout:{visibility:'none'},paint:{
    'circle-radius':['interpolate',['linear'],['zoom'],12,4,16,8],
    'circle-color':'#a78bfa',
    'circle-stroke-width':1.5,
    'circle-stroke-color':'#7c3aed',
    'circle-opacity':0.9
  }});

  // ── Illa de calor urbana ──
  map.addSource('calor',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'calor-fill',type:'fill',source:'calor',layout:{visibility:'none'},paint:{
    'fill-color':['interpolate',['linear'],['get','gridcode'],
      1,'rgba(96,165,250,0.5)',
      2,'rgba(134,239,172,0.5)',
      3,'rgba(253,224,71,0.5)',
      4,'rgba(251,146,60,0.55)',
      5,'rgba(239,68,68,0.6)',
      6,'rgba(127,29,29,0.7)'],
    'fill-outline-color':'rgba(0,0,0,0)'
  }});

  // ── Mapa de soroll per tram de carrer ──
  map.addSource('soroll',{type:'geojson',data:{type:'FeatureCollection',features:[]}});

        }).join('');

async function fetchAll(){
  await Promise.all([fetchTraffic(),fetchBicing(),fetchAir(),fetchMetro(),fetchBus(),fetchFlights(),fetchTrains(),fetchWeather(),fetchShips(),fetchBeaches(),fetchObras(),fetchAccidents(),fetchSnapshot()]);
  fetchArbres();
  fetchPoblacio();
  fetchZonesVerdes();
  fetchSoroll();
  fetchCalor();
  fetchCarrega();
  fetchFonts();
  fetchDesfibril();
  fetchLavabos();
  fetchEquipaments();
  fetchMercats();
  setInterval(fetchFlights,15000);
  setInterval(fetchTrains,20000);
  document.getElementById('updated').textContent='actualitzat '+new Date().toLocaleTimeString('ca');
}
async function fetchTraffic(){const r=await fetch(`${API}/api/trams?geojson=true`);map.getSource('traffic').setData(await r.json());}
async function fetchBicing(){
  const{stations}=await(await fetch(`${API}/api/bicing`)).json();
  map.getSource('bicing').setData({type:'FeatureCollection',features:stations.map(s=>({type:'Feature',properties:{name:s.name,bikes:s.bikes,bikes_electric:s.bikes_electric,slots_free:s.slots_free},geometry:{type:'Point',coordinates:[s.lon,s.lat]}}))});
}
async function fetchWeather(){
  const d=await(await fetch(`${API}/api/weather`)).json();
  const windDir=['N','NE','E','SE','S','SO','O','NO'][Math.round(d.wind_direction/45)%8];
  document.getElementById('s-temp').textContent=d.temperature+'°C';
  document.getElementById('s-wind').textContent=`${d.wind_speed_kmh} km/h ${windDir}`;
  document.getElementById('s-rain').textContent=d.precipitation>0?`${d.precipitation}mm`:'0 mm';
}
async function fetchObras(){
  const data=await(await fetch(`${API}/api/obras?geojson=true`)).json();
  map.getSource('obras').setData(data);
}
async function fetchShips(){
  const d=await(await fetch(`${API}/api/ships`)).json();
  document.getElementById('s-ships').textContent=d.total;
  const list=document.getElementById('ships-list');
  list.innerHTML=d.ships.map(s=>`
    <div class="ship-row">
      <div class="ship-name">${s.name}</div>
      <div class="ship-detail">${s.country} · ${s.operator.substring(0,30)}</div>
      <div class="ship-detail">ETD: ${s.etd.substring(11,16)||'—'} · Moll: ${s.berth||'—'}</div>
    </div>`).join('');
  const geo=await(await fetch(`${API}/api/ships?geojson=true`)).json();
  map.getSource('ships').setData(geo);
}

async function fetchBeaches(){
  const{beaches}=await(await fetch(`${API}/api/beaches`)).json();
  const features=beaches.filter(b=>b.coords).map(b=>({
    type:'Feature',
    properties:{...b,name:b.name||b.id.split('.').pop().replace(/_/g,' ')},
    geometry:{type:'Point',coordinates:b.coords}
  }));
  map.getSource('beaches').setData({type:'FeatureCollection',features});
}

async function fetchSnapshot(){
  const d=await(await fetch(`${API}/api/snapshot`)).json();
  document.getElementById('s-congestion').textContent=d.traffic.congestion_index.toFixed(2);
  document.getElementById('s-bikes').textContent=d.bicing.bikes_available.toLocaleString();
  document.getElementById('s-electric').textContent=d.bicing.bikes_electric;
  const ci=d.traffic.congestion_index;
  document.getElementById('s-congestion').style.color=ci<2?'#22c55e':ci<3?'#eab308':ci<4?'#f97316':'#ef4444';
}
function toggleLayer(layer,btn){
  layerState[layer]=!layerState[layer];
  btn.classList.toggle('active');
  const vis=layerState[layer]?'visible':'none';
  if(layer==='traffic')map.setLayoutProperty('traffic-lines','visibility',vis);
  if(layer==='bicing'){map.setLayoutProperty('bicing-circles','visibility',vis);map.setLayoutProperty('bicing-labels','visibility',vis);}
  if(layer==='metro'){map.setLayoutProperty('metro-circles','visibility',vis);map.setLayoutProperty('metro-labels','visibility',vis);}
  if(layer==='flights'){map.setLayoutProperty('flights-symbols','visibility',vis);map.setLayoutProperty('flights-labels','visibility',vis);}
  if(layer==='ships'){map.setLayoutProperty('ships-circles','visibility',vis);map.setLayoutProperty('ships-labels','visibility',vis);}
  if(layer==='trains'){map.setLayoutProperty('trains-circles','visibility',vis);map.setLayoutProperty('trains-labels','visibility',vis);}
  if(layer==='beaches')map.setLayoutProperty('beaches-circles','visibility',vis);
  if(layer==='obras'){map.setLayoutProperty('obras-circles','visibility',vis);map.setLayoutProperty('obras-labels','visibility',vis);}
  if(layer==='bus')map.setLayoutProperty('bus-circles','visibility',vis);
  if(layer==='air')map.setLayoutProperty('air-heat','visibility',vis);
  if(layer==='arbres'){map.setLayoutProperty('arbres-clusters','visibility',vis);map.setLayoutProperty('arbres-cluster-count','visibility',vis);map.setLayoutProperty('arbres-points','visibility',vis);}
  if(layer==='accidents'){map.setLayoutProperty('accidents-heat','visibility',vis);map.setLayoutProperty('accidents-circles','visibility',vis);}
  if(layer==='carrega')map.setLayoutProperty('carrega-circles','visibility',vis);
  if(layer==='equipaments')map.setLayoutProperty('equipaments-circles','visibility',vis);
  if(layer==='mercats')map.setLayoutProperty('mercats-circles','visibility',vis);
  if(layer==='fonts')map.setLayoutProperty('fonts-circles','visibility',vis);
  if(layer==='desfibril')map.setLayoutProperty('desfibril-circles','visibility',vis);
  if(layer==='lavabos')map.setLayoutProperty('lavabos-circles','visibility',vis);
  if(layer==='calor')map.setLayoutProperty('calor-fill','visibility',vis);
  if(layer==='soroll')map.setLayoutProperty('soroll-lines','visibility',vis);
  if(layer==='zones_verdes')map.setLayoutProperty('zones-verdes-fill','visibility',vis);
  if(layer==='poblacio')map.setLayoutProperty('poblacio-fill','visibility',vis);
  if(layer==='edificis'){
    map.setLayoutProperty('edificis-3d','visibility',vis);
    if(layerState['edificis']){
      map.easeTo({pitch:55,bearing:-20,duration:800});
    } else {
      map.easeTo({pitch:0,bearing:0,duration:600});
    }
  }
}
function toggleShipsPanel(btn){const p=document.getElementById('ships-panel');const visible=p.style.display==='block';p.style.display=visible?'none':'block';if(btn)btn.classList.toggle('active',!visible);}
function showTooltip(e,html){tooltip.style.display='block';tooltip.innerHTML=html;tooltip.style.left=(e.point.x+14)+'px';tooltip.style.top=(e.point.y-10)+'px';}
function hideTooltip(){tooltip.style.display='none';}
